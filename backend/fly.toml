# fly.toml app configuration file generated for training-app-v1 on 2026-07-09T06:15:06Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'training-app-v1'
primary_region = 'syd'

[build]

[env]
  DAILY_JOB_HOUR = '6'
  ENABLE_SCHEDULER = 'true'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
